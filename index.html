<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecasting</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

    <link rel="stylesheet" href="./style.css">

    <script src="./script.js" defer></script>
</head>

<body>
    <div class="container">
        <header class="input-container">
            <form action="">
                <input type="text" class="city-input" id="city-input" placeholder="Search City">
                <button type="submit" class="search-btn"><span class="material-symbols-outlined">
                        search
                    </span></button>
            </form>
        </header>

        <section class="weather-info" style="display:none;">
            <div class="location-data-container">
                <div class="location">
                    <span class="material-symbols-outlined">
                        location_on
                    </span>
                    <h4 class="country-txt">-</h4>
                </div>
                <h5 class="current-date-txt regular-text">-</h5>
            </div>

            <div class="weather-summary-container">
                <img src="" alt="" class="weather-summary-img">
                <div class="weather-summary-info">
                    <h1 class="temp-txt">-</h1>
                    <h3 class="condition-txt regular-text">-</h3>
                </div>
            </div>

            <div class="weather-conditions-container">
                <div class="condition-item">
                    <span class="material-symbols-outlined">
                        water_drop
                    </span>
                    <div class="condition-info">
                        <h5 class="regular-text">Humidity</h5>
                        <h5 class="humidity-value-txt">-</h5>
                    </div>
                </div>

                <div class="condition-item">
                    <span class="material-symbols-outlined">
                        air
                    </span>
                    <div class="condition-info">
                        <h5 class="regular-text">Wind Speed</h5>
                        <h5 class="wind-value-txt">-</h5>
                    </div>
                </div>

                <div class="condition-item">
                    <span class="material-symbols-outlined">
                        nest_sunblock
                    </span>
                    <div class="condition-info">
                        <h5 class="regular-text">UV Index</h5>
                        <h5 class="uv-value-txt">-</h5>
                    </div>
                </div>

                <div class="condition-item">
                    <span class="material-symbols-outlined">
                        aq_indoor
                    </span>
                    <div class="condition-info">
                        <h5 class="regular-text">AQI</h5>
                        <h5 class="aqi-value-txt">-</h5>
                    </div>
                </div>
            </div>

            <div class="forecast-items-container">
                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-text">-</h5>
                    <img src="" alt="" class="forecast-item-img">
                    <h5 class="forecast-item-temp">-</h5>
                </div>

                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-text">-</h5>
                    <img src="" alt="" class="forecast-item-img">
                    <h5 class="forecast-item-temp">-</h5>
                </div>

                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-text">-</h5>
                    <img src="" alt="" class="forecast-item-img">
                    <h5 class="forecast-item-temp">-</h5>
                </div>

                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-text">-</h5>
                    <img src="" alt="" class="forecast-item-img">
                    <h5 class="forecast-item-temp">-</h5>
                </div>

                <div class="forecast-item">
                    <h5 class="forecast-item-date regular-text">-</h5>
                    <img src="" alt="" class="forecast-item-img">
                    <h5 class="forecast-item-temp">-</h5>
                </div>
            </div>
        </section>

        <section class="search-city section-msg">
            <img src="./images/search-city.png" alt="">
            <div>
                <h1>Search City</h1>
                <h4 class="regular-text">
                    Find the weather conditions of your city
                </h4>
            </div>
        </section>

        <section class="not-found section-msg" style="display: none;">
            <img src="./images/not-found.png" alt="">
            <div>
                <h1>Search City</h1>
                <h4 class="regular-text">
                    Find the weather conditions of your city
                </h4>
            </div>
        </section>
    </div>

</body>

</html>
